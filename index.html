<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoSmart - Desafío Mundial</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <h1>Geo<span>Smart</span></h1>
        </div>
        <nav class="nav-buttons">
            <button id="btn-menu" class="btn-primary">Menú</button>
            <button id="btn-settings" class="btn-primary">Configuración</button>
        </nav>
    </header>

    <main id="app">
        <!-- El contenido será inyectado por JavaScript -->
        <div class="loader">Cargando desafío...</div>
    </main>

    <footer class="main-footer">
        <p>2026 GeoSmart | Geografía para mentes brillantes</p>
    </footer>

    <!-- Scripts -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const app = document.getElementById('app');
            if (app) {
                app.innerHTML = '<div style="padding: 2rem; color: #ef4444; background: rgba(239,68,68,0.1); border-radius: 1rem; border: 1px solid #ef4444;">' +
                    '<h3>Error de ejecución</h3>' +
                    '<p>' + msg + '</p>' +
                    '<p><small>' + url + ' (Línea ' + lineNo + ')</small></p>' +
                    '<button onclick="location.reload()" class="btn-primary" style="margin-top: 1rem;">Recargar</button>' +
                    '</div>';
            }
            return false;
        };
    </script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
